name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Generate version file
        working-directory: packages/conjure-js
        run: node scripts/gen-version.mjs

      - name: Run tests
        working-directory: packages/conjure-js
        run: bun test

      - name: Build CLI (portable JS bundle)
        working-directory: packages/conjure-js
        run: bun run build-npm-bin

      - name: Publish to npm
        working-directory: packages/conjure-js
        run: npm publish --provenance
        # NO NODE_AUTH_TOKEN is needed because we are using OIDC

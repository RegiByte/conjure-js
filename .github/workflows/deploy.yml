name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build docs (VitePress)
        working-directory: packages/docs
        run: bun run build

      - name: Build playground
        working-directory: packages/playground
        run: bun run build

      # Merge playground into the docs output under /playground/
      # VitePress outputs to packages/docs/.vitepress/dist/
      # Playground builds with base /cljam/playground/ so its assets self-reference correctly
      - name: Merge playground into docs output
        run: |
          mkdir -p packages/docs/.vitepress/dist/playground
          cp -r packages/playground/dist/. packages/docs/.vitepress/dist/playground/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/docs/.vitepress/dist

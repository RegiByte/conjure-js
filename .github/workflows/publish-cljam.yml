name: Publish cljam

on:
  push:
    tags:
      - 'cljam@*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Run tests
        working-directory: packages/cljam
        run: bun run test

      - name: Build Vite plugin
        working-directory: packages/cljam
        run: node scripts/build-vite-plugin.mjs

      - name: Generate core source
        working-directory: packages/cljam
        run: bun run gen:core-source

      - name: Generate version file
        working-directory: packages/cljam
        run: node scripts/gen-version.mjs

      - name: Publish to npm
        working-directory: packages/cljam
        run: npm publish --provenance --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
